<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Wall Calendar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class'
  }
</script>
<style>
.flip { animation: flip 0.4s ease; }
@keyframes flip {
  0% { transform: rotateY(90deg); opacity: 0; }
  100% { transform: rotateY(0); opacity: 1; }
}
</style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 flex justify-center items-center min-h-screen p-4 transition-all">

<div class="bg-white dark:bg-gray-900 shadow-2xl rounded-2xl overflow-hidden max-w-6xl w-full">

  <div class="flex flex-col md:flex-row">

    <!-- HERO -->
    <div class="md:w-1/2 h-64 md:h-auto relative">
      <img id="heroImage" class="w-full h-full object-cover">

      <div id="themeBar"
        class="absolute bottom-0 w-full text-white p-4"
        style="clip-path: polygon(0 30%,100% 0,100% 100%,0% 100%);">

        <h1 id="monthLabel" class="text-2xl font-bold"></h1>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="md:w-1/2 p-4 flex flex-col gap-4 text-gray-800 dark:text-white">

      <!-- HEADER -->
      <div class="flex justify-between items-center">
        <button onclick="changeMonth(-1)">←</button>
        <h2 id="monthTitle" class="text-xl font-bold"></h2>
        <button onclick="changeMonth(1)">→</button>
      </div>

      <!-- CONTROLS -->
      <div class="flex justify-between">
        <button onclick="toggleDark()" class="text-sm bg-gray-200 dark:bg-gray-700 px-2 py-1 rounded">🌙</button>
        <button onclick="changeImage()" class="text-sm bg-gray-200 dark:bg-gray-700 px-2 py-1 rounded">🎨 Theme</button>
      </div>

      <!-- DAYS -->
      <div class="grid grid-cols-7 text-center text-xs opacity-60">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div>
        <div>Thu</div><div>Fri</div><div>Sat</div>
      </div>

      <!-- CALENDAR -->
      <div id="calendar" class="grid grid-cols-7 gap-2"></div>

      <!-- RANGE -->
      <div id="rangeLabel" class="text-sm text-blue-500 font-medium"></div>

      <!-- NOTES -->
      <textarea id="notes"
        class="w-full border rounded p-2 h-20 dark:bg-gray-800"
        placeholder="Select a date..."></textarea>

    </div>
  </div>
</div>

<script>
let currentDate = new Date();
let startDate = null;
let endDate = null;
let isDragging = false;

const calendar = document.getElementById("calendar");
const notesInput = document.getElementById("notes");
const monthTitle = document.getElementById("monthTitle");
const monthLabel = document.getElementById("monthLabel");
const rangeLabel = document.getElementById("rangeLabel");
const themeBar = document.getElementById("themeBar");
const heroImage = document.getElementById("heroImage");

// THEMES
const images = [
  "https://images.unsplash.com/photo-1501785888041-af3ef285b470",
  "https://images.unsplash.com/photo-1507525428034-b723cf961d3e"
];

const colors = ["#2563eb","#059669"];

let themeIndex = 0;

// DARK MODE
function toggleDark() {
  const isDark = document.documentElement.classList.toggle("dark");
  localStorage.setItem("theme", isDark ? "dark" : "light");
}

// Load saved theme
if (localStorage.getItem("theme") === "dark") {
  document.documentElement.classList.add("dark");
}

// IMAGE SWITCH
function changeImage(){
  themeIndex = (themeIndex+1)%images.length;
  heroImage.src = images[themeIndex];
  themeBar.style.background = colors[themeIndex];
}

// KEY SYSTEM (FINAL FIX)
function key(){
  if(startDate && endDate){
    return `range_${startDate.toDateString()}_${endDate.toDateString()}`;
  }
  else if(startDate){
    return `single_${startDate.toDateString()}`;
  }
  return "";
}

// SAVE NOTES
notesInput.addEventListener("input", () => {
  const k = key();
  if(k){
    localStorage.setItem(k, notesInput.value);
  }
});

// LOAD NOTES
function loadNotes(){
  const k = key();
  notesInput.value = k ? localStorage.getItem(k) || "" : "";
}

// LABEL + UX
function updateLabel(){
  if(startDate && endDate){
    rangeLabel.innerText = `📅 ${startDate.toDateString()} → ${endDate.toDateString()}`;
    notesInput.placeholder = "Notes for selected range...";
  } 
  else if(startDate){
    rangeLabel.innerText = `📍 ${startDate.toDateString()}`;
    notesInput.placeholder = "Notes for selected day...";
  } 
  else {
    rangeLabel.innerText = "";
    notesInput.placeholder = "Select a date...";
  }
}

// RENDER
function renderCalendar(){
  calendar.innerHTML="";
  calendar.classList.add("flip");

  const year=currentDate.getFullYear();
  const month=currentDate.getMonth();

  const firstDay=new Date(year,month,1).getDay();
  const lastDate=new Date(year,month+1,0).getDate();

  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  monthTitle.innerText=`${months[month]} ${year}`;
  monthLabel.innerText=`${months[month]} ${year}`;

  for(let i=0;i<firstDay;i++){
    calendar.appendChild(document.createElement("div"));
  }

  for(let i=1;i<=lastDate;i++){
    const date=new Date(year,month,i);
    const div=document.createElement("div");

    div.innerText=i;
    div.className="p-2 text-center rounded cursor-pointer transition";

    // STATES
    if(startDate && date.toDateString()===startDate.toDateString()){
      div.classList.add("bg-blue-500","text-white");
    }
    else if(endDate && date.toDateString()===endDate.toDateString()){
      div.classList.add("bg-blue-500","text-white");
    }
    else if(startDate && endDate && date>startDate && date<endDate){
      div.classList.add("bg-blue-200");
    }
    else{
      div.classList.add("hover:bg-gray-200","dark:hover:bg-gray-700");
    }

    // DRAG SELECT
    div.onmousedown=()=>{
      startDate=date;
      endDate=null;
      isDragging=true;
      updateLabel();
      loadNotes();
      renderCalendar();
    };

    div.onmouseover=()=>{
      if(isDragging){
        endDate=date;
        renderCalendar();
      }
    };

    div.onmouseup=()=>{
      isDragging=false;
      updateLabel();
      loadNotes();
    };

    calendar.appendChild(div);
  }

  setTimeout(()=>calendar.classList.remove("flip"),300);
}

document.body.onmouseup=()=>isDragging=false;

// MONTH NAV
function changeMonth(offset){
  currentDate.setMonth(currentDate.getMonth()+offset);
  renderCalendar();
}

// INIT
changeImage();
renderCalendar();
</script>

</body>
</html>
